<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiply Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SCREEN 1: Home -->
  <div id="screen-home" class="screen active">
    <h1>🧮 Multiply Trainer</h1>
    <div class="name-input-block">
      <label for="player-name">Your Name:</label>
      <input type="text" id="player-name" placeholder="Enter name" maxlength="20">
    </div>
    <h2>Select a Set:</h2>
    <div id="sets-list" class="sets-grid">
      <!-- Generated from tasks.json via JS -->
    </div>
    <button id="btn-leaderboard" class="btn-secondary">🏆 Leaderboard</button>
  </div>

  <!-- SCREEN 2: Game -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div id="timer-display" class="timer">3:00</div>
      <div id="game-title" class="game-title"></div>
      <button id="btn-check" class="btn-primary">✅ Check</button>
    </div>
    <div id="tasks-grid" class="tasks-grid">
      <!-- Generated dynamically via JS -->
    </div>
  </div>

  <!-- SCREEN 3: Result -->
  <div id="screen-result" class="screen">
    <h1>Result!</h1>
    <div id="result-score" class="score-display"></div>
    <div id="result-stats" class="stats-block"></div>
    <div id="result-badges" class="badges-block"></div>
    <div id="result-grid" class="tasks-grid readonly"></div>
    <div class="result-actions">
      <button id="btn-retry" class="btn-primary">🔄 Try Again</button>
      <button id="btn-home" class="btn-secondary">🏠 Home</button>
    </div>
  </div>

  <!-- SCREEN 4: Leaderboard -->
  <div id="screen-leaderboard" class="screen">
    <h1>🏆 Leaderboard</h1>
    <div id="leaderboard-filters" class="filters"></div>
    <table id="leaderboard-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Set</th>
          <th>Points</th>
          <th>Time</th>
          <th>Correct</th>
          <th>Badges</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
    <button id="btn-leaderboard-home" class="btn-secondary">🏠 Home</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
